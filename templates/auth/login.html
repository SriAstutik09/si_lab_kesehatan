<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke Sistem - UNUJA Lab</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome untuk Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            background-image: radial-gradient(#d3e2de 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
        }

        .brand-icon {
            background-color: #00796b;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem auto;
        }

        .btn-tosca {
            background-color: #00796b;
            color: white;
            font-weight: 500;
            border-radius: 10px;
            padding: 0.6rem;
        }

        .btn-tosca:hover {
            background-color: #005b50;
            color: white;
        }

        .btn-biometric {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #334155;
            border-radius: 10px;
            padding: 0.6rem;
            font-weight: 500;
        }

        .btn-biometric:hover {
            background-color: #f8fafc;
        }

        .form-control {
            border-radius: 10px;
            padding: 0.6rem 0.75rem 0.6rem 2.5rem;
        }

        .input-group-text-custom {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #94a3b8;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #94a3b8;
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>

<body>

    <!-- Logo & Judul Atas -->
    <div class="text-center mb-4">
        <div class="brand-icon shadow-sm">
            <i class="fa-solid fa-briefcase-medical"></i>
        </div>
        <h2 class="fw-bold mb-1" style="color: #1e293b;">UNUJA Lab</h2>
        <p class="text-muted small px-4">Sistem Informasi Peminjaman Lab Kesehatan</p>
    </div>

    <!-- Card Form Login -->
    <div class="login-card mx-3">
        <h4 class="fw-bold mb-1" style="color: #1e293b;">Masuk ke Sistem</h4>
        <p class="text-muted small mb-4">Silakan masuk dengan akun Anda</p>

        <form method="POST">
            {% csrf_token %} <!-- Django Token Keamanan -->

            <!-- Input Username -->
            <div class="mb-3 position-relative">
                <label class="form-label small fw-medium text-secondary">Username / NIM</label>
                <span class="input-group-text-custom"><i class="fa-regular fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Masukkan NIM Anda" required>
            </div>

            <!-- Input Password -->
            <div class="mb-3 position-relative">
                <label class="form-label small fw-medium text-secondary">Password</label>
                <span class="input-group-text-custom"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="passwordField" name="password" class="form-control" placeholder="••••••••"
                    required>
                <span class="password-toggle" onclick="togglePassword()"><i class="fa-regular fa-eye"
                        id="toggleIcon"></i></span>
            </div>

            <!-- Ingat Saya & Lupa Password -->
            <div class="d-flex justify-content-between align-items-center mb-4 small">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-secondary" for="rememberMe">Ingat Saya</label>
                </div>
                <a href="#" class="text-decoration-none fw-semibold" style="color: #00796b;">Lupa Password?</a>
            </div>

            <!-- Tombol Masuk -->
            <button type="submit" class="btn btn-tosca w-100 mb-2">
                Masuk <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>

            <div class="divider">ATAU</div>

            <!-- Tombol Biometrik -->
            <button type="button" class="btn btn-biometric w-100">
                <i class="fa-solid fa-fingerprint me-2"></i> Masuk dengan Biometrik
            </button>
        </form>
    </div>

    <!-- Footer Copyright -->
    <div class="text-center mt-5 small text-secondary">
        <p class="mb-1">&copy; 2026 <a href="#" class="text-decoration-none fw-semibold"
                style="color: #00796b;">Universitas Nurul Jadid Paiton Probolinggo</a></p>
        <div class="d-flex justify-content-center gap-3">
            <a href="#" class="text-decoration-none text-muted">Bantuan</a>
            <a href="#" class="text-decoration-none text-muted">Kebijakan Privasi</a>
        </div>
    </div>

    <!-- Script Toggle Password Ringan -->
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
